default: &default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  schema_dump: false

development:
  primary:
    <<: *default
  cable:
    <<: *default
    migrations_paths: db/cable_migrate
    schema_dump: false
  queue:
    <<: *default
    migrations_paths: db/queue_migrate
    schema_dump: false
  cache:
    <<: *default
    migrations_paths: db/cache_migrate
    schema_dump: false

test:
  primary:
    <<: *default
  cable:
    <<: *default
    migrations_paths: db/cable_migrate
    schema_dump: false

production:
  primary:
    <<: *default
  cable:
    <<: *default
    migrations_paths: db/cable_migrate
    schema_dump: false
  queue:
    <<: *default
    migrations_paths: db/queue_migrate
    schema_dump: false
  cache:
    <<: *default
    migrations_paths: db/cache_migrate
    schema_dump: false
